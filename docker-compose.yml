version: "3.8"

services:
  api-gateway:
    build: 
      context: .
      dockerfile: Dockerfile
    command: node services/api-gateway/index.js
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    restart: unless-stopped

  auth-service:
    build: 
      context: .
      dockerfile: Dockerfile
    command: node services/auth-service/index.js
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/hotella_auth
      - JWT_SECRET=super_secret_jwt_key_hotella
    depends_on:
      - mongodb
    restart: unless-stopped

  room_booking-service:
    build: 
      context: .
      dockerfile: Dockerfile
    command: node services/room_booking-service/index.js
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://mongodb:27017/hotella_rooms
    depends_on:
      - mongodb
    restart: unless-stopped

  booking-service:
    build: 
      context: .
      dockerfile: Dockerfile
    command: node services/event-planing-and-booking_service/index.js
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - MONGO_URI=mongodb://mongodb:27017/hotella_bookings
    depends_on:
      - mongodb
    restart: unless-stopped

  email-service:
    build: 
      context: .
      dockerfile: Dockerfile
    command: node services/email-service/index.js
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
    restart: unless-stopped

  external-payment-api:
    build: 
      context: ./services/external-payment-api
      dockerfile: Dockerfile
    ports:
      - "5005:8080"
    environment:
      - PORT=8080
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
