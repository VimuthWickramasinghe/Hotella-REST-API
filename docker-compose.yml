services:
  api-gateway:
    build: 
      context: .
      dockerfile: Dockerfile
    command: node services/api-gateway/index.js
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - AUTH_SERVICE_URL=http://auth-service:5001
      - ROOM_SERVICE_URL=http://room_booking-service:5002
      - BOOKING_SERVICE_URL=http://booking-service:5003
      - EMAIL_SERVICE_URL=http://email-service:5004
      - PAYMENT_SERVICE_URL=http://external-payment-api:5005
    restart: unless-stopped

  auth-service:
    build: 
      context: .
      dockerfile: Dockerfile
    command: node services/auth-service/index.js
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/hotella_auth
      - JWT_SECRET=super_secret_jwt_key_hotella
    depends_on:
      - mongodb
    restart: unless-stopped

  room_booking-service:
    build: 
      context: .
      dockerfile: Dockerfile
    command: node services/room_booking-service/index.js
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://mongodb-rooms:27017/hotella_rooms
    depends_on:
      - mongodb-rooms
    restart: unless-stopped

  booking-service:
    build: 
      context: .
      dockerfile: Dockerfile
    command: node services/event-planing-and-booking_service/index.js
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - MONGO_URI=mongodb://mongodb-bookings:27017/hotella_bookings
    depends_on:
      - mongodb-bookings
    restart: unless-stopped

  email-service:
    build: 
      context: .
      dockerfile: Dockerfile
    command: node services/email-service/index.js
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - SMTP_HOST=smtp.mailtrap.io
      - SMTP_PORT=2525
      - SMTP_USER=your_mailtrap_user
      - SMTP_PASS=your_mailtrap_pass
      - EMAIL_FROM="Hotella" <no-reply@hotella.com>
    restart: unless-stopped

  external-payment-api:
    build: 
      context: .
      dockerfile: Dockerfile
    command: node services/external-payment-api/index.js
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
    restart: unless-stopped

  mongodb-auth:
    image: mongo:6.0
    volumes:
      - mongo_auth_data:/data/db
    restart: unless-stopped

  mongodb-rooms:
    image: mongo:6.0
    volumes:
      - mongo_rooms_data:/data/db
    restart: unless-stopped

  mongodb-bookings:
    image: mongo:6.0
    volumes:
      - mongo_bookings_data:/data/db
    restart: unless-stopped

volumes:
  mongo_auth_data:
  mongo_rooms_data:
  mongo_bookings_data:
